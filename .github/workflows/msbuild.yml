# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: ReleaseCI

  # Directory for build artifacts
  ARTIFACTS_DIR: ${{github.workspace}}/artifacts

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate Version
      id: version
      shell: pwsh
      run: |
        # Get latest tag
        $latestTag = git describe --tags --abbrev=0 2>$null
        if (-not $latestTag) {
          $latestTag = "v1.0.0"
        }

        # Parse version (remove 'v' prefix)
        $version = $latestTag -replace '^v', ''
        $parts = $version -split '\.'
        $major = [int]$parts[0]
        $minor = [int]$parts[1]
        $patch = [int]$parts[2]

        # Increment patch version
        $patch++

        # Create new version
        $newVersion = "v$major.$minor.$patch"

        Write-Host "Previous version: $latestTag"
        Write-Host "New version: $newVersion"

        # Set output
        echo "version=$newVersion" >> $env:GITHUB_OUTPUT
        echo "version_no_v=$major.$minor.$patch" >> $env:GITHUB_OUTPUT

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:OutDir=${{env.ARTIFACTS_DIR}} ${{env.SOLUTION_FILE_PATH}}

    - name: Upload Driver Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: psvr2-toolkit-driver
        path: |
          ${{env.ARTIFACTS_DIR}}/driver_playstation_vr2.dll
          ${{env.ARTIFACTS_DIR}}/driver_playstation_vr2.pdb

    - name: Upload Companion App Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: psvr2-toolkit-app
        path: |
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.exe
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.dll
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.runtimeconfig.json
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.deps.json
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.pdb
          ${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.IPC.dll
          ${{env.ARTIFACTS_DIR}}/Newtonsoft.Json.dll

    # Package release files
    - name: Create Release Package
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: pwsh
      run: |
        # Create release directory
        New-Item -ItemType Directory -Force -Path release

        # Copy driver files
        Copy-Item "${{env.ARTIFACTS_DIR}}/driver_playstation_vr2.dll" -Destination release/

        # Copy companion app files (.NET 8.0)
        Copy-Item "${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.exe" -Destination release/
        Copy-Item "${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.dll" -Destination release/
        Copy-Item "${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.runtimeconfig.json" -Destination release/
        Copy-Item "${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.App.deps.json" -Destination release/
        Copy-Item "${{env.ARTIFACTS_DIR}}/PSVR2Toolkit.IPC.dll" -Destination release/
        Copy-Item "${{env.ARTIFACTS_DIR}}/Newtonsoft.Json.dll" -Destination release/

        # Copy documentation
        Copy-Item README.md -Destination release/
        Copy-Item INSTALL.md -Destination release/
        Copy-Item CALIBRATION_INTEGRATION.md -Destination release/ -ErrorAction SilentlyContinue

        # Create zip archive
        Compress-Archive -Path release/* -DestinationPath PSVR2Toolkit-${{steps.version.outputs.version}}.zip

    # Create GitHub Release
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{steps.version.outputs.version}}
        name: PSVR2 Toolkit ${{steps.version.outputs.version}}
        files: |
          PSVR2Toolkit-${{steps.version.outputs.version}}.zip
        body: |
          ## PSVR2 Toolkit ${{steps.version.outputs.version}}

          ### What's Included
          - ✅ Enhanced OpenVR driver with eye tracking calibration support
          - ✅ Companion application with calibration UI and battery monitoring
          - ✅ Complete installation and usage documentation

          ### Quick Installation
          1. Download and extract `PSVR2Toolkit-${{steps.version.outputs.version}}.zip`
          2. Backup your original `driver_playstation_vr2.dll` in Steam folder
          3. Replace it with the one from this package
          4. Copy companion app files to a permanent location
          5. Restart SteamVR

          **See INSTALL.md for detailed step-by-step instructions.**

          ### Features
          - 🎯 Eye tracking calibration with gaze offset adjustment
          - 🎮 DualSense trigger effect profiles (Soft, Medium, Rigid, Vibration)
          - 🔋 Real-time battery monitoring for controllers
          - 🔧 Health check and diagnostics
          - ⚙️ Manual settings adjustment

          ### Requirements
          - PlayStation VR2 headset
          - SteamVR installed
          - .NET 8.0 Runtime (included in Windows 11)

          ### Support
          - 📖 Documentation: See INSTALL.md in the package
          - 🐛 Issues: https://github.com/sanudatta11/PSVR2Toolkit-Upgraded/issues
          - 💬 Discord: https://discord.gg/dPsfJhsGwb
        draft: false
        prerelease: false

    # Note: PSVR2EyeTrackingCalibration.exe should be built separately and included in releases
    # The calibration tool is located at j:\PSVR2EyeTrackingCalibration and requires OpenXR SDK
